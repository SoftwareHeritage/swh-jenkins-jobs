- job-group:
    name: swh-environment-jobs-{name}
    jobs:
      - "{name}"
      - "{name}/tests"
      - "{name}/docker-tests"

- job-template:
    name: "{name}/tests"
    display-name: tests
    gitlab_project_name: swh/devel/swh-environment
    description: Run tests for each swh module in development version
    project-type: pipeline
    docker_image: tox
    docker_options: --tmpfs /tmp:exec --privileged --device /dev/fuse
    python_version: "3.11"
    sandbox: true
    timeout: 120
    max_concurrent: 2
    properties:
      - throttle:
          option: project
          max-per-node: "{max_concurrent}"
          max-total: 0
    triggers: !j2-yaml: |
      {% if production_jenkins %}
      - timed: "H */6 * * *"
      {% else %}
      []
      {% endif %}
    parameters:
      - text:
          name: APPLY_MERGE_REQUESTS
          default:
          description: |
            Apply merge requests to SWH packages before running tests.
            Add one merge request URL per line in that text parameter to apply them.

    dsl: !include-jinja2: templates/swh-environment.groovy.j2

- job-template:
    name: "{name}/docker-tests"
    gitlab_project_name: swh/devel/docker
    description: >
      Build the swh/stack:latest image and run tests.

      Note that this will run the docker image build step WITHOUT the '--no-cache'
      option. Nevertheless, the build stage installing Software Heritage Python 
      packages is never cached. If you need to enforce rebuilding the image from 
      scratch, trigger the job by hand from jenkins by setting the NO_DOCKER_CACHE 
      parameter to true.

    project-type: pipeline
    docker_image: tox
    docker_options: -v /tmp:/tmp
    sandbox: true
    max_concurrent: 2
    properties:
      - build-discarder:
          days-to-keep: 20
      - gitlab:
          connection: "{gitlab_connection_name}"
      - throttle:
          option: project
          max-per-node: "{max_concurrent}"
          max-total: 0
    triggers: !j2-yaml: |
      {% if production_jenkins %}
      - timed: "@midnight"
      {% endif %}
      - gitlab:
          trigger-push: true
          trigger-merge-request: true
          trigger-open-merge-request-push: source
          trigger-only-if-new-commits-pushed: true
          trigger-note: true
          note-regex: "@jenkins.*retry.*build"
          wip-skip: false
          add-ci-message: true
          cancel-pending-builds-on-update: true
          # secret jenkins token is generated when executing tox
          secret-token: !include-raw-verbatim: templates/jenkins-token
    parameters:
      - bool:
          name: NO_DOCKER_CACHE
          default: false
          description: |
            Force the full rebuild of the swh/stack docker image by
            using the --no-cache option of "docker build"
      - bool:
          name: USE_SWH_PACKAGES_DEV_VERSIONS
          default: false
          description: |
            Use current heads of their git repositories to install SWH
            packages instead of installing them from their latest releases
            available on PyPI.

    dsl: !include-jinja2: templates/swh-docker-dev.groovy.j2

- project:
    name: DENV
    display-name: swh-environment
    jobs:
      - "swh-environment-jobs-{name}"
